<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak Surprise | UDS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; }
        body { 
            background-color: var(--dark); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
            color: white; 
            text-align: center;
        }
        
        .container { width: 100%; max-width: 350px; padding: 10px; }
        
        /* Gift Box Style */
        .gift-box-wrapper { cursor: pointer; transition: 0.4s; }
        .gift-box-wrapper img { width: 200px; border-radius: 15px; box-shadow: 0 0 20px var(--gold); }
        .hint-text { margin-top: 15px; color: var(--gold); font-weight: bold; animation: blink 1.2s infinite; }
        
        /* Surprise Photo Area */
        #surprise-section { display: none; width: 100%; animation: zoomIn 0.7s forwards; }
        #eid-photo { width: 100%; border-radius: 15px; border: 2px solid var(--gold); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        /* Social Share Icons */
        .share-container { display: flex; margin-top: 20px; gap: 15px; justify-content: center; }
        .share-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--gold); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.2rem; transition: 0.3s; }
        .share-btn:hover { background: var(--gold); color: black; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <audio id="eidMusic" loop>
        <source src="nasheed.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="main-gift" class="gift-box-wrapper" onclick="openGift()">
            <img src="https://i.ibb.co/N6f6419j/8bdcd7ff196109837336265039b529f3.jpg" alt="Gift Box">
            <div class="hint-text">U R GIFT OPEN NOW</div>
        </div>

        <div id="surprise-section">
            <img src="https://i.ibb.co/kVfLLRMz/20260317-115542.jpg" id="eid-photo" alt="Eid Mubarak Surprise">
            
            <div class="share-container">
                <a href="https://wa.me/?text=Eid%20Mubarak%20Surprise%20Check%20Karein!" target="_blank" class="share-btn"><i class="fab fa-whatsapp"></i></a>
                <a href="https://www.facebook.com/" target="_blank" class="share-btn"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.tiktok.com/" target="_blank" class="share-btn"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </div>

    <script>
        function openGift() {
            // Box ko hide karein aur photo dikhayein
            document.getElementById('main-gift').style.display = 'none';
            document.getElementById('surprise-section').style.display = 'block';
            
            // Music Playback
            var audio = document.getElementById('eidMusic');
            audio.play().catch(function(e) { 
                console.log("Music auto-play blocked by browser. User needs to click first."); 
            });
        }
    </script>
</body>
</html>
